on:
  pull_request:
    types: [opened, synchronize, edited, review_requested, ready_for_review]
name: PR

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: mbrobbel/rustfmt-check@9a22c8ce35fa788e7db3bfb4c814ad1c13b4d5be #0.20.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: review
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, rustfmt, clippy
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d #2.0.4
